<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay" style="display: none;"></div>
    <div class="add" style="display: none;">
        <button onclick="closeadd()" class="closeadd">X</button>
        <div class="interior">
            <h2><strong>Adicionar</strong></h2>
            <form action="add()" class="addform">
                <label for="nomep">Nome do Produto: </label>
                <input type="text" name="nomep" id="nomep">
                
                <label for="tipo">Tipo</label>
                <select name="tipo" id="tipo">
                    <option value="materia-prima">Matéria prima</option>
                    <option value="produto">Produto</option>
                </select>

                <div id="gramagem" style="display: none;">
                    <label for="gram">Gramagem: </label>
                    <input type="number" name="gram" id="gram">

                    <label for="g-kg">Tipo de pesagem: </label>
                    <div class="radiogram">
                        <input type="radio" name="g-kg" id="g">g
                        <input type="radio" name="g-kg" id="kg">Kg
                    </div>
                </div>
            </form>
        </div>
    </div>
    <header>
        <nav>
            <a href="index.html">Estoque</a>
            <a href="">Pedidos</a>
            <a href="">Ajuda</a>
        </nav>
    </header>
    <main>
        <div class="container">
            <h1>Estoque</h1>
            <button onclick="openadd()" class="botao">Adicionar <br> Produto</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
